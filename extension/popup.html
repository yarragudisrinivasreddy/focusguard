<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FocusGuard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      background: #0d0f0e;
      color: #e8ede9;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
    }

    .header {
      display: flex; align-items: center; gap: 10px;
      padding: 16px 16px 12px;
      border-bottom: 1px solid #252926;
    }
    .logo-icon { font-size: 20px; }
    .logo-text { font-size: 16px; font-weight: 600; color: #4ade80; }
    .privacy-tag {
      margin-left: auto; font-size: 9px; color: #4ade80;
      background: #1a4029; padding: 2px 7px; border-radius: 10px;
      font-family: monospace; letter-spacing: 0.05em;
    }

    .status-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 16px; background: #131614;
      font-size: 11px; color: #6b7a6d; font-family: monospace;
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #6b7a6d; flex-shrink: 0;
    }
    .status-dot.active { background: #4ade80; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .stats-row {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 1px; background: #252926;
      border-bottom: 1px solid #252926;
    }
    .stat {
      background: #131614; padding: 12px 10px; text-align: center;
    }
    .stat-val { font-size: 22px; font-weight: 700; color: #4ade80; font-family: monospace; line-height: 1; }
    .stat-lbl { font-size: 9px; color: #6b7a6d; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 3px; }

    .last-result {
      padding: 12px 16px;
      border-bottom: 1px solid #252926;
      display: none;
    }
    .last-result.visible { display: block; }
    .result-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .fatigue-chip {
      padding: 3px 10px; border-radius: 12px;
      font-size: 10px; font-family: monospace;
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .fatigue-chip.low { background: #1a4029; color: #4ade80; border: 1px solid #4ade80; }
    .fatigue-chip.medium { background: #3d2e0a; color: #fbbf24; border: 1px solid #fbbf24; }
    .fatigue-chip.high { background: #3d1010; color: #f87171; border: 1px solid #f87171; }
    .posture-score { font-family: monospace; font-size: 11px; color: #6b7a6d; margin-left: auto; }

    .tip-box {
      background: #1a1d1b; border-left: 2px solid #4ade80;
      padding: 8px 10px; border-radius: 0 6px 6px 0;
      font-size: 12px; line-height: 1.5; color: #e8ede9;
    }

    .controls { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }

    .interval-row {
      display: flex; align-items: center; gap: 8px; margin-bottom: 4px;
    }
    .interval-row label { font-size: 11px; color: #6b7a6d; }
    select {
      flex: 1; background: #1a1d1b; border: 1px solid #252926;
      color: #e8ede9; border-radius: 6px; padding: 5px 8px;
      font-size: 11px; font-family: monospace;
    }

    .btn-row { display: flex; gap: 8px; }

    .btn-primary {
      flex: 1; padding: 10px; border-radius: 8px;
      background: #4ade80; color: #000;
      border: none; font-weight: 600; font-size: 13px;
      cursor: pointer; transition: background 0.2s;
    }
    .btn-primary:hover { background: #6ee7a0; }
    .btn-primary.stop { background: #f87171; color: #fff; }
    .btn-primary.stop:hover { background: #fca5a5; }

    .btn-secondary {
      padding: 10px 14px; border-radius: 8px;
      background: transparent; border: 1px solid #252926;
      color: #e8ede9; font-size: 13px; cursor: pointer;
      transition: all 0.2s; white-space: nowrap;
    }
    .btn-secondary:hover:not(:disabled) { border-color: #4ade80; color: #4ade80; }
    .btn-secondary:disabled { opacity: 0.3; cursor: not-allowed; }

    .next-check {
      text-align: center; font-family: monospace; font-size: 11px;
      color: #4ade80; padding: 4px 0 8px;
    }

    .open-app {
      display: block; width: 100%; padding: 9px;
      background: #131614; border: 1px solid #252926;
      border-radius: 8px; color: #6b7a6d;
      font-size: 11px; text-align: center; cursor: pointer;
      text-decoration: none; transition: all 0.2s;
    }
    .open-app:hover { border-color: #4ade80; color: #4ade80; }

    .analyzing-msg {
      text-align: center; padding: 8px;
      font-size: 11px; color: #4ade80; font-family: monospace;
      animation: pulse 1s infinite; display: none;
    }
    .analyzing-msg.visible { display: block; }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo-icon">⬡</span>
    <span class="logo-text">FocusGuard</span>
    <span class="privacy-tag">100% LOCAL</span>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Idle — click Start to begin monitoring</span>
  </div>

  <div class="stats-row">
    <div class="stat">
      <div class="stat-val" id="stat-checks">0</div>
      <div class="stat-lbl">Checks</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="stat-posture">—</div>
      <div class="stat-lbl">Posture</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="stat-fatigue">—</div>
      <div class="stat-lbl">Fatigue</div>
    </div>
  </div>

  <div class="last-result" id="last-result">
    <div class="result-header">
      <div class="fatigue-chip" id="fatigue-chip">—</div>
      <div class="posture-score" id="posture-label">Posture: —/10</div>
    </div>
    <div class="tip-box" id="tip-box">—</div>
  </div>

  <div class="analyzing-msg" id="analyzing-msg">⬡ Analyzing with Gemma 4...</div>

  <div class="controls">
    <div class="interval-row">
      <label for="interval">Auto-check every</label>
      <select id="interval">
        <option value="1">1 min (demo)</option>
        <option value="5">5 min</option>
        <option value="10" selected>10 min</option>
        <option value="15">15 min</option>
        <option value="30">30 min</option>
      </select>
    </div>

    <div class="btn-row">
      <button class="btn-primary" id="btn-toggle">Start Monitoring</button>
      <button class="btn-secondary" id="btn-check" disabled>Check Now</button>
    </div>

    <div class="next-check" id="next-check"></div>

    <a class="open-app" id="open-app" href="#" target="_blank">
      ⬡ Open FocusGuard Dashboard →
    </a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
